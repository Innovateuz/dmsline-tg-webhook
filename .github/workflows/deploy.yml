name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

env:
  REGISTRY: registry.digitalocean.com/my-registry
  IMAGE_NAME: dmsline-webhook

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v3

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Build image
        run: docker build -t ${{env.REGISTRY}}/${{env.IMAGE_NAME}}:${{github.sha}} .

      - name: Push image
        run: docker push ${{env.REGISTRY}}/${{env.IMAGE_NAME}}:${{github.sha}}

      - name: Tag and push latest
        run: |
          docker tag ${{env.REGISTRY}}/${{env.IMAGE_NAME}}:${{github.sha}} ${{env.REGISTRY}}/${{env.IMAGE_NAME}}:latest
          docker push ${{env.REGISTRY}}/${{env.IMAGE_NAME}}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Deploy to DigitalOcean Droplet
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            mkdir -p /opt/dmsline
            cd /opt/dmsline

            # Ensure all env files exist so docker-compose does not fail
            touch backend.env ecommerce.env frontend.env webhook.env

            # Write the specific env file for this repository
            cat << 'EOF' > webhook.env
${{ secrets.TG_WEBHOOK_ENV }}
'EOF'

            cat << 'EOF' > docker-compose.yml
version: "3.8"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - dmsnet

  backend-blue:
    image: ${BACKEND_IMAGE:-registry.digitalocean.com/my-registry/dmsline-backend:latest}
    env_file: backend.env
    networks:
      - dmsnet
  backend-green:
    image: ${BACKEND_IMAGE:-registry.digitalocean.com/my-registry/dmsline-backend:latest}
    env_file: backend.env
    networks:
      - dmsnet

  ecommerce-blue:
    image: ${ECOMMERCE_IMAGE:-registry.digitalocean.com/my-registry/dmsline-ecommerce:latest}
    env_file: ecommerce.env
    networks:
      - dmsnet
  ecommerce-green:
    image: ${ECOMMERCE_IMAGE:-registry.digitalocean.com/my-registry/dmsline-ecommerce:latest}
    env_file: ecommerce.env
    networks:
      - dmsnet

  frontend-blue:
    image: ${FRONTEND_IMAGE:-registry.digitalocean.com/my-registry/dmsline-frontend:latest}
    env_file: frontend.env
    networks:
      - dmsnet
  frontend-green:
    image: ${FRONTEND_IMAGE:-registry.digitalocean.com/my-registry/dmsline-frontend:latest}
    env_file: frontend.env
    networks:
      - dmsnet

  webhook-blue:
    image: ${WEBHOOK_IMAGE:-registry.digitalocean.com/my-registry/dmsline-webhook:latest}
    env_file: webhook.env
    networks:
      - dmsnet
  webhook-green:
    image: ${WEBHOOK_IMAGE:-registry.digitalocean.com/my-registry/dmsline-webhook:latest}
    env_file: webhook.env
    networks:
      - dmsnet

networks:
  dmsnet:

'EOF'

            cat << 'EOF' > nginx.conf
events {
    worker_connections 1024;
}

http {
    upstream backend {
        server backend-blue:5003;
    }
    upstream ecommerce {
        server ecommerce-blue:3000;
    }
    upstream frontend {
        server frontend-blue:5174;
    }
    upstream webhook {
        server webhook-blue:5005;
    }

    server {
        listen 80;
        server_name server.dmsline.uz;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    server {
        listen 80;
        server_name cloud.dmsline.uz;

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    server {
        listen 80;
        server_name tgwebhook.dmsline.uz;

        location / {
            proxy_pass http://webhook;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    server {
        listen 80;
        server_name *.dmsline.uz;

        location / {
            proxy_pass http://ecommerce;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}

'EOF'

            cat << 'EOF' > deploy.sh
#!/bin/bash
SERVICE=$1
IMAGE=$2

if [ -z "$SERVICE" ] || [ -z "$IMAGE" ]; then
  echo "Usage: ./deploy.sh <service_name> <image_tag>"
  exit 1
fi

doctl registry login

docker pull $IMAGE

CURRENT_COLOR=$(cat active_${SERVICE}_color.txt 2>/dev/null || echo "blue")
if [ "$CURRENT_COLOR" == "blue" ]; then
  NEW_COLOR="green"
else
  NEW_COLOR="blue"
fi

echo "Deploying $SERVICE to $NEW_COLOR..."

export ${SERVICE^^}_IMAGE=$IMAGE

docker-compose up -d --no-deps $SERVICE-$NEW_COLOR

echo "Waiting for $SERVICE-$NEW_COLOR to be ready..."
sleep 15

# Check if the new container is actually running
NEW_CONTAINER_ID=$(docker-compose ps -q $SERVICE-$NEW_COLOR)
if [ -z "$NEW_CONTAINER_ID" ]; then
  echo "ERROR: Container $SERVICE-$NEW_COLOR failed to create."
  exit 1
fi

IS_RUNNING=$(docker inspect -f '{{.State.Running}}' $NEW_CONTAINER_ID)
if [ "$IS_RUNNING" != "true" ]; then
  echo "ERROR: New container $SERVICE-$NEW_COLOR crashed on startup! Aborting deployment."
  echo "Fetching logs for debugging:"
  docker-compose logs --tail=50 $SERVICE-$NEW_COLOR
  # Clean up the broken container
  docker-compose rm -f -s $SERVICE-$NEW_COLOR
  exit 1
fi

echo "New container is healthy! Switching Nginx upstream to $NEW_COLOR..."
sed -i "s/server $SERVICE-[a-z]*:/server $SERVICE-$NEW_COLOR:/g" nginx.conf
docker-compose exec -T nginx nginx -s reload

echo "Stopping old container ($CURRENT_COLOR)..."
docker-compose stop $SERVICE-$CURRENT_COLOR

echo $NEW_COLOR > active_${SERVICE}_color.txt

echo "Deployment of $SERVICE ($NEW_COLOR) completed successfully."

'EOF'

            chmod +x deploy.sh
            
            # Start nginx if not running
            docker-compose up -d nginx

            ./deploy.sh webhook ${{env.REGISTRY}}/${{env.IMAGE_NAME}}:${{github.sha}}
