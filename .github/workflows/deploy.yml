name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

env:
  REGISTRY: registry.digitalocean.com/dmsline
  IMAGE_NAME: dmsline-webhook

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Build image
        run: docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Push image
        run: docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Tag and push latest
        run: |
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Deploy to DigitalOcean Droplet
        uses: appleboy/ssh-action@v0.1.10
        env:
          SERVICE_ENV: ${{ secrets.TG_WEBHOOK_ENV }}
          DEPLOY_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          DO_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: SERVICE_ENV,DEPLOY_IMAGE,DO_TOKEN,CF_TOKEN
          command_timeout: 15m
          script: |
            set -e
            mkdir -p /opt/dmsline
            cd /opt/dmsline

            touch backend.env ecommerce.env frontend.env webhook.env

            RESTORE_COLORS() {
              B_COL=$(cat active_backend_color.txt 2>/dev/null || echo "blue")
              F_COL=$(cat active_frontend_color.txt 2>/dev/null || echo "blue")
              E_COL=$(cat active_ecommerce_color.txt 2>/dev/null || echo "blue")
              W_COL=$(cat active_webhook_color.txt 2>/dev/null || echo "blue")
              sed "s/backend-blue/backend-$B_COL/g" nginx.conf > tmp.conf && cat tmp.conf > nginx.conf
              sed "s/frontend-blue/frontend-$F_COL/g" nginx.conf > tmp.conf && cat tmp.conf > nginx.conf
              sed "s/ecommerce-blue/ecommerce-$E_COL/g" nginx.conf > tmp.conf && cat tmp.conf > nginx.conf
              sed "s/webhook-blue/webhook-$W_COL/g" nginx.conf > tmp.conf && cat tmp.conf > nginx.conf
            }


            echo "$SERVICE_ENV" > webhook.env

            # Update docker-compose with cloudflare certbot image
            echo "" | base64 -d > docker-compose.yml
            echo "" | base64 -d > deploy.sh
            chmod +x deploy.sh

            echo "$DO_TOKEN" | docker login registry.digitalocean.com -u "$DO_TOKEN" --password-stdin

            # Auto SSL setup
            CERT_VOL_PATH=$(docker volume inspect dmsline_certbot-certs --format '{{ .Mountpoint }}' 2>/dev/null || echo "")
            CERT_EXISTS=false
            if [ -n "$CERT_VOL_PATH" ] && [ -f "$CERT_VOL_PATH/live/dmsline.uz/fullchain.pem" ]; then
              CERT_EXISTS=true
            fi

            if [ "$CERT_EXISTS" = "true" ]; then
              echo "SSL cert found, keeping HTTPS config"
              echo "" | base64 -d > nginx.conf
              RESTORE_COLORS
            else
              echo "No SSL cert yet, obtaining certificate using Cloudflare..."
              
              if [ -z "$CF_TOKEN" ]; then
                echo "ERROR: CLOUDFLARE_API_TOKEN secret is missing! Please add it to GitHub Secrets."
                exit 1
              fi

              # Create Cloudflare credentials for certbot
              cat > cloudflare-credentials.ini << CREDEOF
            dns_cloudflare_api_token = $CF_TOKEN
            CREDEOF
              chmod 600 cloudflare-credentials.ini

              echo "" | base64 -d > nginx.conf
              RESTORE_COLORS
              docker compose up -d nginx

              # Stop background certbot to release directory lock
              docker compose stop certbot 2>/dev/null || true

              # Ensure certbot uses cloudflare plugin for generation
              docker compose run --rm --entrypoint certbot certbot certonly \
                --dns-cloudflare \
                --dns-cloudflare-credentials /opt/cloudflare-credentials.ini \
                --dns-cloudflare-propagation-seconds 20 \
                -d "dmsline.uz" \
                -d "*.dmsline.uz" \
                --email admin@dmsline.uz \
                --agree-tos \
                --non-interactive

              # Switch to SSL nginx config
              echo "" | base64 -d > nginx.conf
              RESTORE_COLORS

              # After generation, restart nginx and start background certbot
              docker compose restart nginx
              docker compose up -d certbot
            fi

            docker compose up -d --no-recreate nginx certbot

            ./deploy.sh webhook "$DEPLOY_IMAGE" "$DO_TOKEN"
