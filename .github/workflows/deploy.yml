name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

env:
  REGISTRY: registry.digitalocean.com/dmsline
  IMAGE_NAME: dmsline-webhook

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Build image
        run: docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Push image
        run: docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Tag and push latest
        run: |
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Deploy to DigitalOcean Droplet
        uses: appleboy/ssh-action@v0.1.10
        env:
          SERVICE_ENV: ${{ secrets.TG_WEBHOOK_ENV }}
          DEPLOY_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          DO_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: SERVICE_ENV,DEPLOY_IMAGE,DO_TOKEN
          script: |
            set -e
            mkdir -p /opt/dmsline
            cd /opt/dmsline

            touch backend.env ecommerce.env frontend.env webhook.env

            echo "$SERVICE_ENV" > webhook.env

            echo "" | base64 -d > docker-compose.yml
            echo "" | base64 -d > nginx.conf
            echo "" | base64 -d > deploy.sh
            chmod +x deploy.sh

            echo "$DO_TOKEN" | docker login registry.digitalocean.com -u "$DO_TOKEN" --password-stdin

            docker compose up -d --no-recreate nginx

            ./deploy.sh webhook "$DEPLOY_IMAGE" "$DO_TOKEN"
